evaluate_zone:
  name: Evaluate zone
  description: >-
    Create a Run Request for one or more Irrigation Zones and return the
    Irrigation Decision without watering.
  fields:
    entity_id:
      name: Irrigation Decision sensor(s)
      description: The Irrigation Decision sensor entities to evaluate.
      required: true
      selector:
        entity:
          integration: amazing_irrigation
          domain: sensor
          multiple: true
    force:
      name: Force water
      description: Bypass soft checks (still respects Safety Blockers).
      required: false
      default: false
      selector:
        boolean:

run_zone:
  name: Run zone
  description: >-
    Create a Run Request that waters the targeted zones through their Watering
    Actuator when the decision allows.
  target:
    entity:
      integration: amazing_irrigation
    device:
      integration: amazing_irrigation
  fields:
    force:
      name: Force water
      description: Bypass soft checks (still respects Safety Blockers).
      required: false
      default: false
      selector:
        boolean:

stop_zone:
  name: Stop zone
  description: >-
    Stop an in-progress Watering Event for the targeted zones (only zones with a
    configured stop path).
  target:
    entity:
      integration: amazing_irrigation
    device:
      integration: amazing_irrigation

relearn_from_history:
  name: Re-learn from History
  description: >-
    Fit the zone's physics-informed water-balance model from recent recorder
    moisture, rain, and climate history.
  target:
    entity:
      integration: amazing_irrigation
    device:
      integration: amazing_irrigation
  fields:
    days:
      name: History days
      description: Days of sensor history to learn from. Leave empty to use each zone's configured window. Reaching beyond ~10 days relies on Home Assistant long-term statistics.
      required: false
      selector:
        number:
          min: 1
          max: 365
          mode: box

start_field_capacity_discovery:
  name: Start Field Capacity Discovery
  description: >-
    Begin the guided Field Capacity Discovery workflow for the targeted zones.
    You will be prompted to saturate the moisture sensor and cover the soil; the
    integration then monitors drainage and records Field Capacity automatically.
  target:
    entity:
      integration: amazing_irrigation
    device:
      integration: amazing_irrigation

